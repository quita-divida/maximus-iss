<script>
function abrirApp(nivel){
  const app=document.getElementById('app-aluno');
  app.style.display='block';
  app.innerHTML=gerarNivel(3);
  app.scrollTo(0,0);
  initN3();
}

// ══════════════════════════════════════════
// gerarNivel — retorna o HTML completo do app
// ══════════════════════════════════════════

function gerarNivel(nivel){
  // acesso direto
  const appCSS = `
<style>
:root{
  --bg:#09090a;--bg2:#111112;--bg3:#18181a;--bg4:#1f1f22;--bg5:#28282c;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.10);
  /* N1 */--c1:#00e87a;--c1b:rgba(0,232,122,0.09);--c1b2:rgba(0,232,122,0.15);
  /* N2 */--c2:#7c6dfa;--c2b:rgba(124,109,250,0.09);--c2b2:rgba(124,109,250,0.15);
  /* N3 */--c3:#f5a623;--c3b:rgba(245,166,35,0.09);--c3b2:rgba(245,166,35,0.15);
  --teal:#2dd4bf;--rose:#fb7185;--green:#4ade80;--amber:#fbbf24;
  --text:#ebebeb;--text2:#9a9aa3;--text3:#4f4f5a;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --r:10px;--rl:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
#app-aluno{font-family:var(--font-b);font-size:15px;line-height:1.6;display:flex;width:100%;height:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fadeUp .45s ease both}.a2{animation:fadeUp .45s .08s ease both}.a3{animation:fadeUp .45s .14s ease both}.a4{animation:fadeUp .45s .2s ease both}
/* SIDEBAR */
.asb{width:264px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto}
.asb-top{padding:24px 20px;border-bottom:1px solid var(--border)}
.asb-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.asb-mark{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:14px;color:#000}
.asb-name{font-family:var(--font-d);font-weight:700;font-size:18px;letter-spacing:.5px;color:var(--text)}
.asb-chip{display:flex;align-items:center;gap:8px;border-radius:8px;padding:8px 12px;border:1px solid}
.asb-chip-dot{width:6px;height:6px;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.asb-chip-txt{font-size:12px;font-weight:600;letter-spacing:.3px;flex:1}
.asb-chip-bdg{font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;font-family:var(--font-d)}
.asb-nav{padding:20px 12px;flex:1}
.asb-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:6px}
.asb-a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:1px;color:var(--text2);font-size:13.5px;text-decoration:none}
.asb-a:hover{background:var(--bg3);color:var(--text)}
.asb-a svg{width:15px;height:15px;flex-shrink:0;opacity:.5}
.asb-a:hover svg{opacity:1}
.asb-sep{height:1px;background:var(--border);margin:14px 10px}
.asb-foot{padding:16px 20px;border-top:1px solid var(--border)}
.asb-user{display:flex;align-items:center;gap:10px}
.asb-av{width:30px;height:30px;background:var(--bg4);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2)}
.asb-uname{font-size:12px;font-weight:500;color:var(--text)}
.asb-ulvl{font-size:11px;color:var(--text3)}
.asb-exit{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;transition:color .15s;padding:4px;font-family:var(--font-b)}
.asb-exit:hover{color:var(--rose)}
/* MAIN */
.amain{margin-left:264px;flex:1;display:flex;flex-direction:column;height:100vh;overflow-y:auto;padding-top:0}
.atb{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:14px;background:rgba(9,9,10,0.97);flex-shrink:0;position:sticky;top:0;z-index:150}
/* TOPBAR */
.atb-title{font-family:var(--font-d);font-size:14px;font-weight:600;color:var(--text)}
.atb-sep{width:1px;height:14px;background:var(--border2)}
.atb-sub{font-size:12px;color:var(--text3)}
.atb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.atb-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--text2)}
.atb-dot{width:5px;height:5px;border-radius:50%;animation:glow 2s infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.8)}}
/* CONTENT */
.acont{padding:40px 32px 80px;max-width:920px;width:100%}
/* HERO */
.ahero{margin-bottom:36px}
.ahero-eye{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.ahero-dot{width:5px;height:5px;border-radius:50%}
.ahero-h1{font-family:var(--font-d);font-size:34px;font-weight:800;line-height:1.1;letter-spacing:-.5px;margin-bottom:10px;color:var(--text)}
.ahero-p{font-size:14px;color:var(--text2);max-width:560px;line-height:1.75}
/* STATS */
.astats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px}
.astat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color .2s}
.astat:hover{border-color:var(--border2)}
.astat-l{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.5px;margin-bottom:5px}
.astat-v{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--text)}
/* TABS NAV */
.atabs{display:flex;gap:4px;margin-bottom:28px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:4px}
.atab-btn{flex:1;padding:9px 8px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:12px;font-weight:500;font-family:var(--font-b);cursor:pointer;transition:all .15s;text-align:center}
.atab-btn:hover{color:var(--text);background:var(--bg3)}
.atab-btn.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.atab-panel{display:none}.atab-panel.active{display:block}
/* SEC HEAD */
.asec{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:28px}
.asec-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.asec-line{flex:1;height:1px;background:var(--border)}
/* GUIDE CARD */
.agcard{background:var(--bg2);border:1px solid rgba(255,255,255,0.12);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.agcard:hover{border-color:rgba(255,255,255,0.22);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.agcard-h{display:flex;align-items:center;gap:12px;padding:18px 20px;cursor:pointer;user-select:none;background:var(--bg3)}
.agcard-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agcard-info{flex:1}
.agcard-title{font-size:14px;font-weight:700;color:#fff}
.agcard-sub{font-size:12px;color:var(--text2);margin-top:2px}
.agcard-cnt{font-size:10px;font-weight:700;color:var(--text2);background:var(--bg5);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:3px 10px}
.agcard-chev{width:16px;height:16px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.agcard.open .agcard-chev{transform:rotate(180deg)}
.agcard-body{display:none;border-top:1px solid rgba(255,255,255,0.08)}
.agcard.open .agcard-body{display:block}
/* STEPS */
.asteps{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.astep{display:flex;align-items:flex-start;gap:12px}
.astep-n{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.astep-t{font-size:13px;color:var(--text2);line-height:1.6}
/* PROMPT LIST */
.apl{padding:6px 0}
.api{border-bottom:1px solid rgba(255,255,255,0.06);transition:all .15s;margin:0 8px;border-radius:0}
.api:last-child{border-bottom:none}
.api:hover{background:rgba(255,255,255,0.04);border-radius:10px;margin:2px 8px}
.api-h{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.api-num{width:32px;height:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;font-family:var(--font-d);flex-shrink:0}
.api-title{font-size:14px;font-weight:600;color:#fff;flex:1}
.api-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:5px}
.api-chev{width:15px;height:15px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.api.open .api-chev{transform:rotate(180deg)}
.api-body{display:none;padding:4px 16px 20px}
.api.open .api-body{display:block}
.api-desc{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6}
.api-box{background:#0d0d0f;border:1px solid rgba(255,255,255,0.14);border-radius:var(--r);padding:18px;font-family:monospace;font-size:12.5px;color:#d4e0d4;line-height:1.9;white-space:pre-wrap;word-break:break-word;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.api-box .ph{font-style:italic;font-weight:700}
/* COPY BTN */
.acpbtn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:9px 18px;background:var(--c3);color:#000;border:none;border-radius:100px;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;font-family:var(--font-b);box-shadow:0 2px 12px rgba(245,166,35,0.3)}
.acpbtn:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.4)}
.acpbtn.ok{background:#4ade80;box-shadow:0 2px 12px rgba(74,222,128,0.3);color:#000}
.acpbtn svg{width:13px;height:13px}

.aintro{background:linear-gradient(135deg,rgba(245,166,35,0.06),rgba(245,166,35,0.02));border:1px solid rgba(245,166,35,0.25);border-radius:var(--rl);padding:24px 26px;margin-bottom:22px;position:relative;overflow:hidden}
.aintro::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.6),transparent)}

.apill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.pr{background:rgba(251,113,133,.12);color:#fb7185}
.pa{background:rgba(251,191,36,.12);color:#fbbf24}
.pg{background:rgba(74,222,128,.12);color:#4ade80}

.acc-lbl{font-size:11px;color:var(--text3);margin-bottom:6px}
.acc-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--text)}

.aetapa{display:flex;gap:16px;padding:12px 0;position:relative}

.aetapa-n{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-d);flex-shrink:0;z-index:1}
.aetapa-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}

let n1vis=new Set();

function initN1(){
  const c=document.getElementById('n1prompts');
  if(!c)return;
  c.innerHTML=n1Prompts.map((p,i)=>`
    <div class="api" id="n1p-${i}">
      <div class="api-h" onclick="n1toggle(${i})">
        <span class="api-num">${p.n}</span>
        <span class="api-title">${p.t}</span>
        <span class="api-tag" style="background:${p.tc};color:#00e87a">${p.tag}</span>
        <svg class="api-chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="api-body">
        <div class="api-box">${fmtBox(p.txt,'#00e87a')}</div>
        <button class="acpbtn" id="n1cb-${i}" onclick="cpTxt(n1Prompts[${i}].txt,'n1cb-${i}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copiar prompt
        </button>
      </div>
    </div>`).join('');
}

function n1toggle(i){
  const el=document.getElementById('n1p-'+i);
  el.classList.toggle('open');
  if(el.classList.contains('open')){n1vis.add(i);n1updProg();}
}

function n1updProg(){
  const v=n1vis.size,t=10,p=Math.round(v/t*100);
  const el=document.getElementById('n1prog');
  const fill=document.getElementById('n1fill');
  if(el)el.textContent=v+' / '+t+' prompts';
  if(fill)fill.style.width=p+'%';
}

function n2tab(id,ev){
  if(ev)ev.preventDefault();
  document.querySelectorAll('.atab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.atab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.asb-a.n2nav').forEach(a=>a.classList.remove('active'));
  const panel=document.getElementById('n2-'+id);
  if(panel)panel.classList.add('active');
  if(ev&&ev.target) ev.target.classList.add('active');
  // Render N1 prompts on demand
  if(id==='n1'){
    const c=document.getElementById('n2-n1-prompts');
    if(c&&!c.dataset.done){
      c.dataset.done='1';
      c.innerHTML='<div class="apl">'+n1Prompts.map((p,i)=>{
        const uid='n2n1_'+i;
        return `<div class="api" id="pa-${uid}">
          <div class="api-h" onclick="document.getElementById('pa-${uid}').classList.toggle('open')">
            <span class="api-num">${p.n}</span><span class="api-title">${p.t}</span>
            <span class="api-tag" style="background:rgba(0,232,122,0.09);color:#00e87a">${p.tag}</span>
            <svg class="api-chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="api-body">
            <div class="api-box">${fmtBox(p.txt,'#00e87a')}</div>
            <button class="acpbtn" id="cpb-${uid}" onclick="cpTxtRaw(n1Prompts[${i}].txt,'cpb-${uid}')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copiar prompt
            </button>
          </div>
        </div>`;
      }).join('')+'</div>';
    }
  }
}

function n2toggle(uid){
  const el=document.getElementById('n2p-'+uid);
  el.classList.toggle('open');
  if(el.classList.contains('open')){n2vis.add(uid);n2updProg();}
}

function n2updProg(){
  const total=n2Groups.reduce((s,g)=>s+g.prompts.length,0);
  const v=n2vis.size;
  const el=document.getElementById('n2prog');
  const fill=document.getElementById('n2fill');
  if(el)el.textContent=v+' / '+total;
  if(fill)fill.style.width=Math.round(v/total*100)+'%';
}

function n2AddLinha(){
  n2Linhas.push({id:Date.now(),credor:'',valor:'',tipo:'Cartão de crédito',meses:'',prio:'Alta',desc:'70%',status:'Não iniciado'});
  n2RenderPlan();
}

function n2DelLinha(id){n2Linhas=n2Linhas.filter(l=>l.id!==id);n2RenderPlan();}
function n2Upd(id,f,v){const l=n2Linhas.find(l=>l.id===id);if(l){l[f]=v;n2CalcStats();}}

function n2RenderPlan(){
  const tb=document.getElementById('n2-ptbody');
  if(!tb)return;
  tb.innerHTML=n2Linhas.map(l=>`<tr>
    <td><input value="${l.credor}" placeholder="Ex: Nubank" oninput="n2Upd(${l.id},'credor',this.value)"></td>
    <td><input type="number" value="${l.valor}" placeholder="0" oninput="n2Upd(${l.id},'valor',this.value)"></td>
    <td><select onchange="n2Upd(${l.id},'tipo',this.value)">${pTipos.map(t=>`<option${t===l.tipo?' selected':''}>${t}</option>`).join('')}</select></td>
    <td><input type="number" value="${l.meses}" placeholder="0" oninput="n2Upd(${l.id},'meses',this.value)"></td>
    <td><select onchange="n2Upd(${l.id},'prio',this.value)">${pPrios.map(p=>`<option${p===l.prio?' selected':''}>${p}</option>`).join('')}</select></td>
    <td><select onchange="n2Upd(${l.id},'desc',this.value)">${pDescs.map(d=>`<option${d===l.desc?' selected':''}>${d}</option>`).join('')}</select></td>
    <td><select onchange="n2Upd(${l.id},'status',this.value)">${pStats.map(s=>`<option${s===l.status?' selected':''}>${s}</option>`).join('')}</select></td>
    <td><button class="adelbtn" onclick="n2DelLinha(${l.id})">✕</button></td>
  </tr>`).join('');
  n2CalcStats();
}

function n2CalcStats(){
  const tot=n2Linhas.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const altas=n2Linhas.filter(l=>l.prio==='Alta').length;
  const econ=n2Linhas.reduce((s,l)=>{const v=parseFloat(l.valor)||0;return s+(v*(parseInt(l.desc)||0)/100);},0);
  const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('n2-tot',fmt(tot));set('n2-qtd',n2Linhas.length);set('n2-alta',altas);set('n2-econ',fmt(econ));
}

let n3vis=new Set();
let n3CurMod=0;

function initN3(){
  n3mod(0,null);
  setTimeout(()=>{calcN3Div();calcN3Budget();},100);
}

function n3mod(i,ev){
  if(ev)ev.preventDefault();
  n3CurMod=i;
  document.querySelectorAll('.amod-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.amod-chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.asb-a.n3nav').forEach(a=>a.classList.remove('active'));
  const panel=document.getElementById('n3mod-'+i);
  if(panel)panel.classList.add('active');
  const chips=document.querySelectorAll('.amod-chip');
  if(chips[i])chips[i].classList.add('active');
  const navLinks=document.querySelectorAll('.asb-a.n3nav');
  if(navLinks[i])navLinks[i].style.cssText='background:rgba(245,166,35,0.09);color:#fbbf4a';
  const crumb=document.getElementById('n3-crumb');
  if(crumb)crumb.textContent='Módulo '+(i+1)+' — '+n3Names[i];
  const lbl=document.getElementById('n3-modlbl');
  if(lbl)lbl.textContent='Módulo '+(i+1)+' de 6';
  renderN3Mod(i);
  if(i===0)setTimeout(calcN3Div,100);
  if(i===4)setTimeout(calcN3Budget,100);
}

function renderN3Mod(i){
  const body=document.getElementById('n3mod-body-'+i);
  if(!body||body.dataset.done)return;
  body.dataset.done='1';
  body.innerHTML=n3ModContent[i];
  const pDiv=document.createElement('div');
  body.appendChild(pDiv);
  const sh=document.createElement('div');
  sh.className='asec';
  sh.innerHTML=`<span class="asec-lbl">3 Prompts do Módulo ${i+1}</span><div class="asec-line"></div>`;
  pDiv.appendChild(sh);
  n3Prompts[i].forEach((p,pi)=>{
    const uid=i+'_'+pi;
    const d=document.createElement('div');
    d.className='api';d.id='n3p-'+uid;
    d.innerHTML=`<div class="api-h" onclick="n3toggle('${uid}')">
      <span class="api-num">${p.n}</span>
      <span class="api-title">${p.t}</span>
      <span class="api-tag" style="background:rgba(245,166,35,0.09);color:#fbbf4a">${p.tag}</span>
      <svg class="api-chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div class="api-body">

// ══════════════════════════════════════
// PLANILHA INTELIGENTE — JUROS COMPOSTOS
// ══════════════════════════════════════

// Taxas mensais por tipo (BCB/Serasa 2025-2026)
const TAXAS_MENSAIS = {
  'Cartão de crédito':   0.150,  // 15%/mês — média mercado BCB jan/2026
  'Cheque especial':     0.120,  // 12%/mês — média BCB
  'Empréstimo pessoal':  0.060,  // 6%/mês — média BCB
  'Financiamento':       0.015,  // 1,5%/mês — financiamento veículo/imóvel
  'Água/Luz/Gás':        0.010,  // 1%/mês — concessionárias
  'Aluguel':             0.010,  // 1%/mês — IGPM médio
  'Outro':               0.060,  // 6%/mês — estimativa conservadora
};

// Prazos de prescrição em meses por tipo (Código Civil)
const PRESCRICAO_MESES = {
  'Cartão de crédito':   60,   // 5 anos
  'Cheque especial':     60,   // 5 anos
  'Empréstimo pessoal':  60,   // 5 anos
  'Financiamento':       120,  // 10 anos
  'Água/Luz/Gás':        36,   // 3 anos
  'Aluguel':             36,   // 3 anos
  'Outro':               60,   // 5 anos (padrão CDC)
};

// Faixa de desconto realista por tipo
const DESCONTO_RANGE = {
  'Cartão de crédito':   [0.40, 0.75],
  'Cheque especial':     [0.35, 0.70],
  'Empréstimo pessoal':  [0.30, 0.60],
  'Financiamento':       [0.10, 0.30],
  'Água/Luz/Gás':        [0.20, 0.50],
  'Aluguel':             [0.15, 0.40],
  'Outro':               [0.30, 0.60],
};

const pTipos = Object.keys(TAXAS_MENSAIS);
const pStats  = ['Não iniciado','Em negociação','Acordo feito','Quitado'];

// ── Cálculo central ──
function calcDivida(l) {
  const orig   = parseFloat(l.valor) || 0;
  const meses  = parseInt(l.meses)   || 0;
  const taxa   = TAXAS_MENSAIS[l.tipo]  || 0.06;
  const prescM = PRESCRICAO_MESES[l.tipo] || 60;
  const [dMin, dMax] = DESCONTO_RANGE[l.tipo] || [0.30, 0.60];

  // Valor corrigido com juros compostos
  const corrigido = orig * Math.pow(1 + taxa, meses);

  // Oferta ideal: média do range, arredondado
  const ofertaMediaDesc = (dMin + dMax) / 2;
  const ofertaIdeal     = corrigido * (1 - ofertaMediaDesc);
  const ofertaMin       = corrigido * (1 - dMax);
  const ofertaMax       = corrigido * (1 - dMin);

  // Prescrição
  const prescrita   = meses >= prescM;
  const mesRestante = prescM - meses;
  const proxima     = !prescrita && mesRestante <= 6; // alerta se prescreve em até 6 meses

  // Score de prioridade (0-100): quanto maior, mais urgente negociar
  let score = 0;
  if (l.tipo === 'Cartão de crédito' || l.tipo === 'Cheque especial') score += 40;
  else if (l.tipo === 'Empréstimo pessoal') score += 25;
  else score += 10;
  score += Math.min(meses * 2, 40); // mais tempo = mais urgente
  if (proxima) score += 30;         // prestes a prescrever = muito urgente
  if (prescrita) score = 15;        // prescrita = baixa urgência financeira

  let prio, prioColor;
  if (prescrita)    { prio = 'Prescrita'; prioColor = '#71717a'; }
  else if (score >= 70) { prio = 'Urgente';   prioColor = '#fb7185'; }
  else if (score >= 40) { prio = 'Alta';      prioColor = '#fbbf24'; }
  else                  { prio = 'Média';     prioColor = '#4ade80'; }

  return { orig, meses, taxa, corrigido, ofertaIdeal, ofertaMin, ofertaMax,
           prescrita, proxima, mesRestante, prescM, prio, prioColor, score };
}

function fmtR(n) {
  return 'R$ ' + Math.round(n).toLocaleString('pt-BR');
}

// ── Persistência ──
let n3Linhas = [];
function n3SaveStorage(){ try{ localStorage.setItem('quita_plan_v2', JSON.stringify(n3Linhas)); }catch(e){} }
function n3LoadStorage(){ try{ const d=localStorage.getItem('quita_plan_v2'); if(d) n3Linhas=JSON.parse(d); }catch(e){} }

function n3AddLinha(){
  n3Linhas.push({ id:Date.now(), credor:'', valor:'', tipo:'Cartão de crédito', meses:'', status:'Não iniciado' });
  n3RenderPlan(); n3SaveStorage();
}
function n3DelLinha(id){ n3Linhas=n3Linhas.filter(l=>l.id!==id); n3RenderPlan(); n3SaveStorage(); }
function n3UpdPlan(id,f,v){ const l=n3Linhas.find(l=>l.id===id); if(l){ l[f]=v; n3RenderPlan(); n3SaveStorage(); } }

// ── Renderização ──
function n3RenderPlan(){
  const tb = document.getElementById('n3-ptbody');
  if(!tb) return;

  const _e = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Ordenar por score decrescente
  const sorted = [...n3Linhas].sort((a,b)=>{
    const ca = calcDivida(a), cb = calcDivida(b);
    return cb.score - ca.score;
  });

  tb.innerHTML = sorted.map(l => {
    const c = calcDivida(l);
    const prescTxt = c.prescrita
      ? '<span style="color:#71717a;font-weight:700">Prescrita</span>'
      : c.proxima
        ? `<span style="color:#fb7185;font-weight:700">⚠️ ${c.mesRestante}m restantes</span>`
        : `<span style="color:var(--text3)">${c.mesRestante}m restantes</span>`;

    return `<tr style="${l.status==='Quitado'?'opacity:0.4;text-decoration:line-through':''}">
      <td><input value="${_e(l.credor)}" placeholder="Ex: Nubank"
        oninput="n3UpdPlan(${l.id},'credor',this.value)"
        style="width:100%;font-size:11px;padding:4px 6px;background:#1a1a1e;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#ebebeb;font-family:var(--font-b);outline:none"></td>
      <td><input type="number" value="${_e(l.valor)}" placeholder="0" min="0"
        oninput="n3UpdPlan(${l.id},'valor',this.value)"
        style="width:100%;font-size:11px;padding:4px 6px;background:#1a1a1e;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#ebebeb;font-family:var(--font-b);outline:none"></td>
      <td><select onchange="n3UpdPlan(${l.id},'tipo',this.value)"
        style="width:100%;font-size:11px;padding:4px 5px;background:#1a1a1e;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#ebebeb;font-family:var(--font-b);outline:none">
        ${pTipos.map(t=>`<option${t===l.tipo?' selected':''}>${t}</option>`).join('')}
      </select></td>
      <td><input type="number" value="${_e(l.meses)}" placeholder="0" min="0" max="360"
        oninput="n3UpdPlan(${l.id},'meses',this.value)"
        style="width:100%;font-size:11px;padding:4px 6px;background:#1a1a1e;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#ebebeb;font-family:var(--font-b);outline:none"></td>
      <td style="color:#fbbf24;font-weight:700;font-size:12px">${c.orig>0?fmtR(c.corrigido):'—'}</td>
      <td style="font-size:11px;color:#4ade80">
        ${c.orig>0?`<div style="font-weight:700">${fmtR(c.ofertaIdeal)}</div><div style="color:var(--text3);font-size:10px">${fmtR(c.ofertaMin)}–${fmtR(c.ofertaMax)}</div>`:'—'}
      </td>
      <td style="font-size:11px">${prescTxt}</td>
      <td><span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px;background:${c.prioColor}22;color:${c.prioColor};border:1px solid ${c.prioColor}55">
        ${c.prio}
      </span></td>
      <td><select onchange="n3UpdPlan(${l.id},'status',this.value)"
        style="width:100%;font-size:11px;padding:4px 5px;background:#1a1a1e;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#ebebeb;font-family:var(--font-b);outline:none">
        ${pStats.map(s=>`<option${s===l.status?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><button onclick="n3DelLinha(${l.id})"
        style="background:none;border:1px solid rgba(251,113,133,0.2);border-radius:5px;color:#fb7185;font-size:11px;padding:3px 8px;cursor:pointer;font-family:var(--font-b)">✕</button></td>
    </tr>`;
  }).join('');

  n3CalcStats();
}

function n3CalcStats(){
  const ativos = n3Linhas.filter(l=>l.status!=='Quitado');
  const totOrig    = ativos.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const totCorr    = ativos.reduce((s,l)=>s+calcDivida(l).corrigido,0);
  const totOferta  = ativos.reduce((s,l)=>s+calcDivida(l).ofertaIdeal,0);
  const econ       = totCorr - totOferta;
  const urgentes   = ativos.filter(l=>calcDivida(l).prio==='Urgente'||calcDivida(l).prio==='Alta').length;

  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('n3-qtd',    n3Linhas.length);
  set('n3-tot',    totOrig>0 ? fmtR(totOrig) : 'R$ 0');
  set('n3-tot-corr', totCorr>0 ? fmtR(totCorr) : 'R$ 0');
  set('n3-econ',   econ>0 ? fmtR(econ) : 'R$ 0');
  set('n3-alta',   urgentes);
}

// ── Exportar CSV ──
function n3ExportCSV(){
  const headers = ['Credor','Valor original','Tipo','Meses atraso','Valor corrigido','Oferta ideal','Desconto %','Prescrição','Prioridade','Status'];
  const rows = n3Linhas.map(l=>{
    const c = calcDivida(l);
    const descPct = c.orig>0 ? Math.round((1-c.ofertaIdeal/c.corrigido)*100)+'%' : '-';
    const presc   = c.prescrita ? 'Prescrita' : c.mesRestante+'m restantes';
    return [l.credor,l.valor,l.tipo,l.meses,
      c.orig>0?Math.round(c.corrigido):'',
      c.orig>0?Math.round(c.ofertaIdeal):'',
      descPct, presc, c.prio, l.status].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv = '\uFEFF' + [headers.join(','),...rows].join('\n');
  const a   = document.createElement('a');
  a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download= 'QUITA_planilha_dividas.csv';
  a.click();
}

function calcN3Div(){
  const v=parseFloat(document.getElementById('c0-orig')?.value)||0;
  const m=parseInt(document.getElementById('c0-meses')?.value)||0;
  const j=parseFloat(document.getElementById('c0-juros')?.value)/100||0;
  const hoje=v*Math.pow(1+j,m);
  const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('c0-hoje',fmt(hoje));
  // Oferta estimada: 50% para cartão/banco, mas exibir range realista
  const ofertaMin=hoje*0.40, ofertaMax=hoje*0.70;
  set('c0-oferta',fmt(ofertaMin)+' – '+fmt(ofertaMax));
  set('c0-econ',fmt(hoje-ofertaMin)+' – '+fmt(hoje-ofertaMax));
  // Aviso sobre estimativa
  const av=document.getElementById('c0-aviso');
  if(av) av.style.display = hoje>0 ? 'block' : 'none';
}

function fmtBox(txt,color){
  return txt.replace(/\[([^\]]+)\]/g,`<span class="ph" style="color:${color};font-style:italic">[$1]</span>`).replace(/\n/g,'<br>');
}

function cpTxt(txt,btnId){
  const _done=()=>{
    const b=document.getElementById(btnId);
    if(!b)return;
    const orig=b.innerHTML;
    b.innerHTML=`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Copiado!`;
    b.classList.add('ok');
    setTimeout(()=>{b.innerHTML=orig;b.classList.remove('ok');},2000);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(txt).then(_done).catch(()=>_clipFallback(txt,_done));
  } else {
    _clipFallback(txt,_done);
  }
}
function _clipFallback(txt,cb){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); if(cb)cb(); }catch(e){}
  document.body.removeChild(ta);
}

function cpTxtRaw(txt,btnId){
  cpTxt(txt,btnId);
}

// ── PASSWORD SCREEN LOGIC ──
// ═══════════════════════════════════════
// NOVO SISTEMA DE VALIDAÇÃO POR PADRÃO
// Aceita senhas no formato: QUITA-XXXXXX-XXXXXX
// onde X = letra maiúscula (A-Z) ou número (0-9)
// ═══════════════════════════════════════

const PADRAO_SENHA = /^QUITA-[A-Z0-9]{6}-[A-Z0-9]{6}$/;

let tentativas = 0;

function verificarSenha(){
  if(tentativas >= 5){
    document.getElementById('senha-erro').textContent = '⏳ Muitas tentativas. Aguarde 30 segundos.';
    document.getElementById('senha-erro').style.display = 'block';
    return;
  }
  
  const val = document.getElementById('senha-input').value.trim().toUpperCase();
  
  if(PADRAO_SENHA.test(val)){
    sessionStorage.setItem('quita_auth', '1');
    sessionStorage.setItem('quita_senha', val);
    
    const tela = document.getElementById('tela-senha');
    tela.style.transition = 'opacity .4s'; 
    tela.style.opacity = '0';
    setTimeout(()=>{ 
      tela.style.display = 'none'; 
      abrirApp(3); 
    }, 400);
  } else {
    tentativas++;
    const err = document.getElementById('senha-erro');
    err.textContent = '❌ Senha inválida. Verifique o e-mail recebido após a compra.';
    err.style.display = 'block';
    const inp = document.getElementById('senha-input');
    inp.style.borderColor = 'rgba(251,113,133,0.5)'; 
    inp.value = '';
    inp.classList.add('shake');
    setTimeout(()=>{ 
      inp.classList.remove('shake'); 
      inp.style.borderColor = 'rgba(255,255,255,0.08)'; 
    }, 400);
    if(tentativas >= 5) setTimeout(()=>{ 
      tentativas = 0; 
      err.style.display = 'none'; 
    }, 30000);
  }
}
