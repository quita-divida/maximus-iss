<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUITA — Área de Membros</title>

<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #09090a;
}
#app-aluno {
  position: fixed;
  inset: 0;
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
</style>

<style id="app-main-css">

:root{
  --bg:#09090a;--bg2:#111112;--bg3:#18181a;--bg4:#1f1f22;--bg5:#28282c;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.10);
  /* N1 */--c1:#00e87a;--c1b:rgba(0,232,122,0.09);--c1b2:rgba(0,232,122,0.15);
  /* N2 */--c2:#7c6dfa;--c2b:rgba(124,109,250,0.09);--c2b2:rgba(124,109,250,0.15);
  /* N3 */--c3:#f5a623;--c3b:rgba(245,166,35,0.09);--c3b2:rgba(245,166,35,0.15);
  --teal:#2dd4bf;--rose:#fb7185;--green:#4ade80;--amber:#fbbf24;
  --text:#ebebeb;--text2:#9a9aa3;--text3:#4f4f5a;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --r:10px;--rl:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
#app-aluno{font-family:var(--font-b);font-size:16px;line-height:1.6;display:flex;width:100%;height:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fadeUp .45s ease both}.a2{animation:fadeUp .45s .08s ease both}.a3{animation:fadeUp .45s .14s ease both}.a4{animation:fadeUp .45s .2s ease both}
/* SIDEBAR */
.asb{width:264px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto}
.asb-top{padding:24px 20px;border-bottom:1px solid var(--border)}
.asb-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.asb-mark{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:14px;color:#000}
.asb-name{font-family:var(--font-d);font-weight:700;font-size:18px;letter-spacing:.5px;color:var(--text)}
.asb-chip{display:flex;align-items:center;gap:8px;border-radius:8px;padding:8px 12px;border:1px solid}
.asb-chip-dot{width:6px;height:6px;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.asb-chip-txt{font-size:12px;font-weight:600;letter-spacing:.3px;flex:1}
.asb-chip-bdg{font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;font-family:var(--font-d)}
.asb-nav{padding:20px 12px;flex:1}
.asb-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:6px}
.asb-a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .18s;margin-bottom:2px;color:var(--text2);font-size:13px;text-decoration:none;font-weight:500}
.asb-a:hover{background:var(--bg3);color:var(--text)}
.asb-a svg{width:15px;height:15px;flex-shrink:0;opacity:.5;transition:opacity .18s}
.asb-a:hover svg{opacity:1}
.asb-a.active{color:var(--text)!important;font-weight:600}
.asb-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform .18s}
.asb-a:hover .asb-ico{transform:scale(1.08)}
.asb-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:.5px}
.asb-sep{height:1px;background:var(--border);margin:14px 10px}
.asb-foot{padding:16px 20px;border-top:1px solid var(--border)}
.asb-user{display:flex;align-items:center;gap:10px}
.asb-av{width:30px;height:30px;background:var(--bg4);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2)}
.asb-uname{font-size:12px;font-weight:500;color:var(--text)}
.asb-ulvl{font-size:11px;color:var(--text3)}
.asb-exit{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;transition:color .15s;padding:4px;font-family:var(--font-b)}
.asb-exit:hover{color:var(--rose)}
/* MAIN */
.amain{margin-left:264px;flex:1;display:flex;flex-direction:column;height:100vh;overflow-y:auto;padding-top:0}
.atb{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:14px;background:rgba(9,9,10,0.97);flex-shrink:0;position:sticky;top:0;z-index:150}
/* TOPBAR */
.atb-title{font-family:var(--font-d);font-size:15px;font-weight:600;color:var(--text)}
.atb-sep{width:1px;height:14px;background:var(--border2)}
.atb-sub{font-size:12px;color:var(--text3)}
.atb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.atb-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--text2)}
.atb-dot{width:5px;height:5px;border-radius:50%;animation:glow 2s infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.8)}}
/* CONTENT */
.acont{padding:40px 32px 80px;max-width:920px;width:100%}
/* HERO */
.ahero{margin-bottom:36px}
.ahero-eye{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.ahero-dot{width:5px;height:5px;border-radius:50%}
.ahero-h1{font-family:var(--font-d);font-size:34px;font-weight:800;line-height:1.1;letter-spacing:-.5px;margin-bottom:10px;color:var(--text)}
.ahero-p{font-size:16px;color:var(--text2);max-width:560px;line-height:1.75}
/* STATS */
.astats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px}
.astat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color .2s}
.astat:hover{border-color:var(--border2)}
.astat-l{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.5px;margin-bottom:5px}
.astat-v{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--text)}
/* TABS NAV */
.atabs{display:flex;gap:4px;margin-bottom:28px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:4px}
.atab-btn{flex:1;padding:9px 8px;border-radius:10px;border:none;background:none;color:var(--text2);font-size:12px;font-weight:500;font-family:var(--font-b);cursor:pointer;transition:all .15s;text-align:center}
.atab-btn:hover{color:var(--text);background:var(--bg3)}
.atab-btn.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.atab-panel{display:none}.atab-panel.active{display:block}
/* SEC HEAD */
.asec{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:28px}
.asec-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.asec-line{flex:1;height:1px;background:var(--border)}
/* GUIDE CARD */
.agcard{background:var(--bg2);border:1px solid rgba(255,255,255,0.12);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.agcard:hover{border-color:rgba(255,255,255,0.22);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.agcard-h{display:flex;align-items:center;gap:12px;padding:18px 20px;cursor:pointer;user-select:none;background:var(--bg3)}
.agcard-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agcard-info{flex:1}
.agcard-title{font-size:14px;font-weight:700;color:#fff}
.agcard-sub{font-size:12px;color:var(--text2);margin-top:2px}
.agcard-cnt{font-size:10px;font-weight:700;color:var(--text2);background:var(--bg5);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:3px 10px}
.agcard-chev{width:16px;height:16px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.agcard.open .agcard-chev{transform:rotate(180deg)}
.agcard-body{display:none;border-top:1px solid rgba(255,255,255,0.08)}
.agcard.open .agcard-body{display:block}
/* STEPS */
.asteps{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.astep{display:flex;align-items:flex-start;gap:12px}
.astep-n{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.astep-t{font-size:15px;color:var(--text2);line-height:1.6}
/* PROMPT LIST */
.apl{padding:6px 0}
.api{border-bottom:1px solid rgba(255,255,255,0.06);transition:all .15s;margin:0 8px;border-radius:0}
.api:last-child{border-bottom:none}
.api:hover{background:rgba(255,255,255,0.04);border-radius:10px;margin:2px 8px}
.api-h{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.api-num{width:32px;height:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;font-family:var(--font-d);flex-shrink:0}
.api-title{font-size:16px;font-weight:600;color:#fff;flex:1}
.api-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:5px}
.api-chev{width:15px;height:15px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.api.open .api-chev{transform:rotate(180deg)}
.api-body{display:none;padding:4px 16px 20px}
.api.open .api-body{display:block}
.api-desc{font-size:14px;color:var(--text3);margin-bottom:10px;line-height:1.6}
.api-box{background:#0d0d0f;border:1px solid rgba(255,255,255,0.14);border-radius:var(--r);padding:18px;font-family:monospace;font-size:14.5px;color:#d4e0d4;line-height:1.9;white-space:pre-wrap;word-break:break-word;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.api-box .ph{font-style:italic;font-weight:700}
/* COPY BTN */
.acpbtn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:9px 18px;background:var(--c3);color:#000;border:none;border-radius:100px;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;font-family:var(--font-b);box-shadow:0 2px 12px rgba(245,166,35,0.3)}
.acpbtn:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.4)}
.acpbtn.ok{background:#4ade80;box-shadow:0 2px 12px rgba(74,222,128,0.3);color:#000}
.acpbtn svg{width:13px;height:13px}
/* INTRO CARD */
.aintro{background:linear-gradient(135deg,rgba(245,166,35,0.06),rgba(245,166,35,0.02));border:1px solid rgba(245,166,35,0.25);border-radius:var(--rl);padding:24px 26px;margin-bottom:22px;position:relative;overflow:hidden}
.aintro::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.6),transparent)}
.aintro-eye{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.aintro-title{font-family:var(--font-d);font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.aintro-desc{font-size:15px;color:var(--text2);line-height:1.75;max-width:600px}
/* INFO TABLE */
.aitbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);margin:10px 0}
table.aitbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.aitbl th{background:var(--bg3);color:var(--text3);font-weight:500;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
table.aitbl td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.5;vertical-align:top}
table.aitbl tr:last-child td{border-bottom:none}
table.aitbl tr:hover td{background:var(--bg3)}
.apill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.pr{background:rgba(251,113,133,.12);color:#fb7185}
.pa{background:rgba(251,191,36,.12);color:#fbbf24}
.pg{background:rgba(74,222,128,.12);color:#4ade80}
/* CALC */
.acalc{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:10px 0}
.acc-card{background:var(--bg3);border-radius:var(--r);padding:14px 16px}
.acc-lbl{font-size:11px;color:var(--text3);margin-bottom:6px}
.acc-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--text)}
.acc-inp{width:100%;margin-top:6px;font-size:15px;padding:6px 10px;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--font-b);outline:none}
/* ETAPAS */
.aetapas{display:flex;flex-direction:column;gap:0;margin:10px 0}
.aetapa{display:flex;gap:16px;padding:12px 0;position:relative}
.aetapa:not(:last-child)::after{content:'';position:absolute;left:15px;top:40px;bottom:0;width:1px;background:var(--border)}
.aetapa-n{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-d);flex-shrink:0;z-index:1}
.aetapa-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.aetapa-desc{font-size:14px;color:var(--text3);line-height:1.6}
/* SCRIPT BOX */
.ascript-box{background:#0d0d0f;border:1px solid rgba(255,255,255,0.14);border-radius:var(--r);padding:20px;font-size:15px;color:#d4e0d4;line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-bottom:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.ascript-box b{color:#fff;font-weight:700}
.sc-obj{color:#fbbf24;font-style:italic}
.sc-resp{color:#86efac}
/* MSG GRID */
.amsg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.amsg-card{background:var(--bg2);border:1px solid rgba(255,255,255,0.12);border-radius:var(--rl);overflow:hidden;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.amsg-card:hover{border-color:rgba(255,255,255,0.22);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4)}
.amsg-h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;border-bottom:1px solid rgba(255,255,255,0.08);background:var(--bg3)}
.amsg-ico{font-size:16px}
.amsg-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.amsg-chev{width:14px;height:14px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.amsg-card.open .amsg-chev{transform:rotate(180deg)}
.amsg-body{display:none;padding:14px 18px}
.amsg-card.open .amsg-body{display:block}
.amsg-box{background:#0d0d0f;border:1px solid rgba(255,255,255,0.12);border-radius:var(--r);padding:14px;font-size:14px;color:#d4e0d4;line-height:1.85;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
/* PLANILHA */
.aplan-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.aps{background:var(--bg3);border-radius:var(--r);padding:12px 14px}
.aps-l{font-size:13px;color:var(--text3);margin-bottom:4px}
.aps-v{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text)}
.aptbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--bg2)}
table.aptbl{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}
table.aptbl th{background:var(--bg3);color:var(--text3);font-weight:500;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
table.aptbl td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
table.aptbl tr:last-child td{border-bottom:none}
table.aptbl tr:hover td{background:var(--bg3)}
table.aptbl input,table.aptbl select{width:100%;font-size:11px;padding:4px 6px;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--font-b);outline:none}
.aaddbtn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-b)}
.aaddbtn:hover{background:var(--bg4);color:var(--text)}
.adelbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:10px;padding:2px 7px;cursor:pointer;font-family:var(--font-b)}
.adelbtn:hover{border-color:var(--rose);color:var(--rose)}
/* MOD CHIPS N3 */
.amod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.amod-chip{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.amod-chip:hover{border-color:var(--border2);background:var(--bg3)}

let n1vis=new Set();

function initN1(){
  const c=document.getElementById('n1prompts');
  if(!c)return;
  c.innerHTML=n1Prompts.map((p,i)=>`
    <div class="api" id="n1p-${i}">
      <div class="api-h" onclick="n1toggle(${i})">
        <span class="api-num">${p.n}</span>
        <span class="api-title">${p.t}</span>
        <span class="api-tag" style="background:${p.tc};color:#00e87a">${p.tag}</span>
        <svg class="api-chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="api-body">
        <div class="api-box">${fmtBox(p.txt,'#00e87a')}</div>
        <button class="acpbtn" id="n1cb-${i}" onclick="cpTxt(n1Prompts[${i}].txt,'n1cb-${i}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copiar prompt
        </button>
      </div>
    </div>`).join('');
}

function n1toggle(i){
  const el=document.getElementById('n1p-'+i);
  el.classList.toggle('open');
  if(el.classList.contains('open')){n1vis.add(i);n1updProg();}
}

function n1updProg(){
  const v=n1vis.size,t=10,p=Math.round(v/t*100);
  const el=document.getElementById('n1prog');
  const fill=document.getElementById('n1fill');
  if(el)el.textContent=v+' / '+t+' prompts';
  if(fill)fill.style.width=p+'%';
}

function n2tab(id,ev){
  if(ev)ev.preventDefault();
  document.querySelectorAll('.atab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.atab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.asb-a.n2nav').forEach(a=>a.classList.remove('active'));
  const panel=document.getElementById('n2-'+id);
  if(panel)panel.classList.add('active');
  if(ev&&ev.target) ev.target.classList.add('active');
  // Render N1 prompts on demand
  if(id==='n1'){
    const c=document.getElementById('n2-n1-prompts');
    if(c&&!c.dataset.done){
      c.dataset.done='1';
      c.innerHTML='<div class="apl">'+n1Prompts.map((p,i)=>{
        const uid='n2n1_'+i;
        return `<div class="api" id="pa-${uid}">
          <div class="api-h" onclick="document.getElementById('pa-${uid}').classList.toggle('open')">
            <span class="api-num">${p.n}</span><span class="api-title">${p.t}</span>
            <span class="api-tag" style="background:rgba(0,232,122,0.09);color:#00e87a">${p.tag}</span>
            <svg class="api-chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="api-body">
            <div class="api-box">${fmtBox(p.txt,'#00e87a')}</div>
            <button class="acpbtn" id="cpb-${uid}" onclick="cpTxtRaw(n1Prompts[${i}].txt,'cpb-${uid}')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copiar prompt

          </div>
        </div>`;
      }).join('')+'</div>';
    }

}

function n2updProg(){
  const total=n2Groups.reduce((s,g)=>s+g.prompts.length,0);

function n2AddLinha(){
  n2Linhas.push({id:Date.now(),credor:'',valor:'',tipo:'Cartão de crédito',meses:'',prio:'Alta',desc:'70%',status:'Não iniciado'});
  n2RenderPlan();
}

function n2DelLinha(id){n2Linhas=n2Linhas.filter(l=>l.id!==id);n2RenderPlan();}
function n2Upd(id,f,v){const l=n2Linhas.find(l=>l.id===id);if(l){l[f]=v;n2CalcStats();}}

function n2RenderPlan(){
  const tb=document.getElementById('n2-ptbody');
  if(!tb)return;
  tb.innerHTML=n2Linhas.map(l=>`<tr>
    <td><input value="${l.credor}" placeholder="Ex: Nubank" oninput="n2Upd(${l.id},'credor',this.value)"></td>
    <td><input type="number" value="${l.valor}" placeholder="0" oninput="n2Upd(${l.id},'valor',this.value)"></td>
    <td><select onchange="n2Upd(${l.id},'tipo',this.value)">${pTipos.map(t=>`<option${t===l.tipo?' selected':''}>${t}</option>`).join('')}</select></td>
    <td><input type="number" value="${l.meses}" placeholder="0" oninput="n2Upd(${l.id},'meses',this.value)"></td>
    <td><select onchange="n2Upd(${l.id},'prio',this.value)">${pPrios.map(p=>`<option${p===l.prio?' selected':''}>${p}</option>`).join('')}</select></td>
    <td><select onchange="n2Upd(${l.id},'desc',this.value)">${pDescs.map(d=>`<option${d===l.desc?' selected':''}>${d}</option>`).join('')}</select></td>
    <td><select onchange="n2Upd(${l.id},'status',this.value)">${pStats.map(s=>`<option${s===l.status?' selected':''}>${s}</option>`).join('')}</select></td>
    <td><button class="adelbtn" onclick="n2DelLinha(${l.id})">✕</button></td>
  </tr>`).join('');
  n2CalcStats();
}

function n2CalcStats(){
  const tot=n2Linhas.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const altas=n2Linhas.filter(l=>l.prio==='Alta').length;
  const econ=n2Linhas.reduce((s,l)=>{const v=parseFloat(l.valor)||0;return s+(v*(parseInt(l.desc)||0)/100);},0);
  const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('n2-tot',fmt(tot));set('n2-qtd',n2Linhas.length);set('n2-alta',altas);set('n2-econ',fmt(econ));
}

  'Cartão de crédito':  0.150,

// Mapeamento tipo → código SGS do Banco Central
// https://www3.bcb.gov.br/sgspub/
const BCB_SERIES = {
  'Cartão de crédito':  20541,  // Cartão rotativo total (% a.m.)
  'Cheque especial':    20786,  // Cheque especial (% a.m.)
  'Empréstimo pessoal': 20588,  // Empréstimo pessoal não consignado (% a.m.)

// Água/Luz/Gás, Aluguel e Outro não têm série BCB — mantêm fallback

// Taxa ativa (começa com fallback, atualizada pela API)

let _taxasDataRef = null; // data da última atualização das taxas

const PRESCRICAO_MESES = {
  'Cartão de crédito':  60,
  'Cheque especial':    60,
  'Empréstimo pessoal': 60,
  'Financiamento':      120,
  'Água/Luz/Gás':       36,

};
const DESCONTO_RANGE = {
  'Cartão de crédito':  [0.40, 0.75],
  'Cheque especial':    [0.35, 0.70],
  'Empréstimo pessoal': [0.30, 0.60],
  'Financiamento':      [0.10, 0.30],
  'Água/Luz/Gás':       [0.20, 0.50],

async function n3AtualizarTaxas() {
  const statusEl = document.getElementById('n3-taxas-status');
  const badgeEl  = document.getElementById('n3-taxas-badge');
  if (statusEl) statusEl.textContent = 'Consultando Banco Central...';

  // Monta URL multi-série do BCB — retorna últimos valores de cada série
  const codigos = Object.values(BCB_SERIES).join(',');
  const url = `https://api.bcb.gov.br/dados/serie/bcdata.sgs.${Object.values(BCB_SERIES)[0]}/dados/ultimos/1?formato=json`;

  try {
    // Busca cada série individualmente (API SGS não suporta multi-série no path)
    const tipos = Object.keys(BCB_SERIES);
    const fetches = tipos.map(tipo => {
      const serie = BCB_SERIES[tipo];
      return fetch(`https://api.bcb.gov.br/dados/serie/bcdata.sgs.${serie}/dados/ultimos/1?formato=json`)
        .then(r => r.ok ? r.json() : null)
        .then(data => ({ tipo, data }))
        .catch(() => ({ tipo, data: null }));
    });

    const results = await Promise.all(fetches);
    let atualizou = false;
    let dataRef = null;

    results.forEach(({ tipo, data }) => {
      if (data && data[0] && data[0].valor != null) {
        const rawVal = parseFloat(data[0].valor);
        // BCB SGS retorna % ao mês (ex: "15.30" = 15,30%/mês → 0.1530)
        // Sanidade: taxas mensais de crédito ficam entre 0,1% e 25%
        if (rawVal >= 0.1 && rawVal <= 25) {
          const taxaMensal = rawVal / 100;
          TAXAS_MENSAIS[tipo] = taxaMensal;
        }
        // Se fora do range, mantém fallback — dado suspeito
        if (!dataRef) dataRef = data[0].data; // "dd/MM/yyyy"
        atualizou = true;
      }
    });

    if (atualizou) {
      _taxasDataRef = dataRef;
      if (statusEl) statusEl.innerHTML =
        `<span style="color:#4ade80">✓ Taxas atualizadas do BCB</span> <span style="color:var(--text3)">· Referência: ${dataRef}</span>`;
      if (badgeEl) { badgeEl.style.background = 'rgba(74,222,128,0.15)'; badgeEl.style.borderColor = 'rgba(74,222,128,0.3)'; badgeEl.style.color = '#4ade80'; badgeEl.textContent = 'BCB AO VIVO'; }
      // Atualiza texto de detalhes das taxas
      const det = document.getElementById('n3-taxas-detalhe');
      if (det) {
        const fmt = t => (t * 100).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:2}) + '%/mês';
        det.innerHTML =
          `Cartão de crédito: <b style="color:#fb7185">${fmt(TAXAS_MENSAIS['Cartão de crédito'])}</b> · ` +
          `Cheque especial: <b style="color:#fb7185">${fmt(TAXAS_MENSAIS['Cheque especial'])}</b> · ` +
          `Empréstimo pessoal: <b style="color:#fbbf24">${fmt(TAXAS_MENSAIS['Empréstimo pessoal'])}</b> · ` +
          `Financiamento: <b style="color:#4ade80">${fmt(TAXAS_MENSAIS['Financiamento'])}</b> · ` +
          `Água/Luz/Gás: <b style="color:#4ade80">${fmt(TAXAS_MENSAIS['Água/Luz/Gás'])}</b> · ` +
          `Aluguel: <b style="color:#4ade80">${fmt(TAXAS_MENSAIS['Aluguel'])}</b>`;
      }
      // Re-renderiza com taxas novas
      if (n3Linhas.length > 0) n3RenderPlan();
    } else {
      throw new Error('sem dados');
    }
  } catch (e) {
    if (statusEl) statusEl.innerHTML =
      `<span style="color:#fbbf24">⚠ Usando taxas fixas (BCB indisponível)</span>`;
    if (badgeEl) { badgeEl.style.color = '#fbbf24'; badgeEl.textContent = 'FIXAS'; }
  }
}

// ── Cálculo central (puro, sem side-effects) ──
function calcDivida(l) {
  const orig   = parseFloat(l.valor) || 0;
  const meses  = parseInt(l.meses)   || 0;
  const taxa   = TAXAS_MENSAIS[l.tipo]  || 0.06;
  const prescM = PRESCRICAO_MESES[l.tipo] || 60;
  const [dMin, dMax] = DESCONTO_RANGE[l.tipo] || [0.30, 0.60];
  // Cap de meses para evitar overflow (30 anos = 360 meses)
  const mesesSafe = Math.min(meses, 360);
  const corrigido = orig * Math.pow(1 + taxa, mesesSafe);
  const ofertaIdeal   = corrigido * (1 - (dMin + dMax) / 2);
  const ofertaMin     = corrigido * (1 - dMax);
  const ofertaMax     = corrigido * (1 - dMin);
  const prescrita     = meses >= prescM;
  const mesRestante   = Math.max(0, prescM - meses);
  const proxima       = !prescrita && mesRestante <= 6;
  let score = 0;
  if (l.tipo === 'Cartão de crédito' || l.tipo === 'Cheque especial') score += 40;
  else if (l.tipo === 'Empréstimo pessoal') score += 25;
  else score += 10;
  score += Math.min(meses * 2, 40);
  if (proxima)   score += 30;
  if (prescrita) score = 15;
  let prio, prioColor;
  if (prescrita)        { prio = 'Prescrita'; prioColor = '#71717a'; }
  else if (score >= 70) { prio = 'Urgente';   prioColor = '#fb7185'; }
  else if (score >= 40) { prio = 'Alta';      prioColor = '#fbbf24'; }
  else                  { prio = 'Média';     prioColor = '#4ade80'; }
  return { orig, meses, taxa, corrigido, ofertaIdeal, ofertaMin, ofertaMax,
           prescrita, proxima, mesRestante, prescM, prio, prioColor, score };
}

function _e(s)   { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function n3SaveStorage() {
  clearTimeout(_n3SaveTimer);
  _n3SaveTimer = setTimeout(() => {
    try { localStorage.setItem('quita_plan_v2', JSON.stringify(n3Linhas)); } catch(e) {}
  }, 300);
}
function n3LoadStorage() {
  try { const d = localStorage.getItem('quita_plan_v2'); if (d) n3Linhas = JSON.parse(d); } catch(e) {}
}

// ── CRUD ──
function n3AddLinha() {
  const nova = { id: Date.now(), credor:'', valor:'', tipo:'Cartão de crédito', meses:'', status:'Não iniciado' };
  n3Linhas.push(nova);
  n3SaveStorage();
  n3RenderPlan();
  // Foca no input do credor da linha recém-criada
  setTimeout(() => {
    const inp = document.querySelector('[data-id="' + nova.id + '"][data-field="credor"]');
    if (inp) inp.focus();
  }, 50);
}

function n3DelLinha(id) {
  if (!confirm('Remover esta dívida?')) return;
  n3Linhas = n3Linhas.filter(l => l.id !== id);
  n3SaveStorage();
  n3RenderPlan();
}

function n3UpdField(id, field, value) {
  const l = n3Linhas.find(l => l.id === id);
  if (!l) return;
  // Sanidade: meses máx 360 (30 anos), valor máx R$10M
  if (field === 'meses') {
    const m = parseInt(value) || 0;
    if (m > 360) { value = '360'; }
    if (m < 0)   { value = '0'; }
  }
  if (field === 'valor') {
    const v = parseFloat(value) || 0;
    if (v > 10000000) { value = '10000000'; } // cap R$10M
    if (v < 0)        { value = '0'; }
  }
  l[field] = value;
  n3SaveStorage();
  // Atualiza apenas as células calculadas dessa linha — sem re-render total
  n3UpdateRowCalcs(id);
  n3CalcStats();
}

function n3LimparTudo() {
  if (!confirm('Apagar TODAS as dívidas? Esta ação não pode ser desfeita.')) return;
  n3Linhas = [];
  n3SaveStorage();
  n3RenderPlan();
}

// ── Filtro ──
function n3SetFiltro(f) {
  n3Filtro = f;
  // Atualiza botões de filtro
  ['all','urgente','alta','quitado'].forEach(k => {
    const btn = document.getElementById('pf-' + k);
    if (btn) btn.style.background = k === f ? '#1f1f22' : 'none';
  });
  n3RenderPlan();
}

// ── Ordenação ──
function n3Sort(key) {
  if (n3SortKey === key) { n3SortDir *= -1; }
  else { n3SortKey = key; n3SortDir = -1; }
  // Atualiza indicadores visuais
  ['credor','valor','meses','corrigido','prio'].forEach(k => {
    const el = document.getElementById('ns-' + k);
    if (el) el.textContent = k === key ? (n3SortDir === -1 ? ' ↓' : ' ↑') : '';
  });
  n3RenderPlan();
}

function n3GetSorted() {
  let rows = [...n3Linhas];
  // Filtro
  if (n3Filtro === 'urgente') rows = rows.filter(l => calcDivida(l).prio === 'Urgente');
  else if (n3Filtro === 'alta') rows = rows.filter(l => calcDivida(l).prio === 'Alta' || calcDivida(l).prio === 'Urgente');
  else if (n3Filtro === 'quitado') rows = rows.filter(l => l.status === 'Quitado');
  // Ordenação
  rows.sort((a, b) => {
    const ca = calcDivida(a), cb = calcDivida(b);
    let va, vb;
    if (n3SortKey === 'credor')    { va = (a.credor||'').toLowerCase(); vb = (b.credor||'').toLowerCase(); return va < vb ? -n3SortDir : va > vb ? n3SortDir : 0; }
    if (n3SortKey === 'valor')     { va = parseFloat(a.valor)||0; vb = parseFloat(b.valor)||0; }
    else if (n3SortKey === 'meses')    { va = parseInt(a.meses)||0; vb = parseInt(b.meses)||0; }
    else if (n3SortKey === 'corrigido') { va = ca.corrigido; vb = cb.corrigido; }
    else { va = ca.score; vb = cb.score; }
    return (va - vb) * n3SortDir;
  });
  return rows;
}

// ── Renderização INTELIGENTE — só re-renderiza quando necessário ──
function n3RenderPlan() {
  const tb = document.getElementById('n3-ptbody');
  if (!tb) return;
  const rows = n3GetSorted();
  const empty = document.getElementById('n3-empty');
  const totalRow = document.getElementById('n3-total-row');
  if (empty) empty.style.display = rows.length === 0 ? 'block' : 'none';
  if (totalRow) totalRow.style.display = rows.length > 0 ? 'grid' : 'none';

  tb.innerHTML = rows.map(l => n3RowHTML(l)).join('');
  n3CalcStats();
}

// Atualiza só as células de cálculo de uma linha (sem re-render completo)
function n3UpdateRowCalcs(id) {
  const l = n3Linhas.find(l => l.id === id);
  if (!l) return;
  const c = calcDivida(l);
  const descPct = c.orig > 0 ? Math.round((1 - c.ofertaIdeal / c.corrigido) * 100) : 0;
  const corrEl   = document.querySelector('[data-calc="' + id + '-corr"]');
  const ofertaEl = document.querySelector('[data-calc="' + id + '-oferta"]');
  if (corrEl) corrEl.innerHTML = c.orig > 0
    ? `<span style="font-size:12px;font-weight:700;color:#fbbf24">${fmtR(c.corrigido)}</span>
       <span style="font-size:10px;color:var(--text3);margin-top:1px">+${Math.round((c.corrigido/c.orig-1)*100)}% juros</span>`
    : '<span style="color:var(--text3)">—</span>';
  if (ofertaEl) ofertaEl.innerHTML = c.orig > 0
    ? `<span style="font-size:12px;font-weight:700;color:#4ade80">${fmtR(c.ofertaIdeal)}</span>
       <span style="font-size:10px;color:var(--text3);margin-top:1px">${descPct}% desc · ${fmtR(c.ofertaMin)}–${fmtR(c.ofertaMax)}</span>`
    : '<span style="color:var(--text3)">—</span>';
}

// ── Stats & KPIs ──
function n3CalcStats() {
  const ativos   = n3Linhas.filter(l => l.status !== 'Quitado');
  const quitados = n3Linhas.filter(l => l.status === 'Quitado');
  const totOrig  = ativos.reduce((s, l) => s + (parseFloat(l.valor) || 0), 0);
  const totCorr  = ativos.reduce((s, l) => s + calcDivida(l).corrigido, 0);
  const totOferta= ativos.reduce((s, l) => s + calcDivida(l).ofertaIdeal, 0);
  const econ     = totCorr - totOferta;
  const urgentes = ativos.filter(l => { const p = calcDivida(l).prio; return p === 'Urgente' || p === 'Alta'; }).length;
  const jurosAcum = totOrig > 0 ? Math.round((totCorr / totOrig - 1) * 100) : 0;

  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  const setHTML = (id, v) => { const el = document.getElementById(id); if (el) el.innerHTML = v; };

  set('n3-qtd',      n3Linhas.length);
  set('n3-qtd-sub',  n3Linhas.length === 1 ? '— cadastrada' : '— cadastradas');
  set('n3-tot',      totOrig > 0 ? fmtR(totOrig) : 'R$\u00a00');
  set('n3-tot-corr', totCorr > 0 ? fmtR(totCorr) : 'R$\u00a00');
  set('n3-juros-sub', jurosAcum > 0 ? `+${jurosAcum}% de juros acumulados` : 'com juros acumulados');
  set('n3-oferta',   totOferta > 0 ? fmtR(totOferta) : 'R$\u00a00');
  set('n3-econ',     econ > 0 ? `economia: ${fmtR(econ)}` : 'economia potencial');
  set('n3-alta',     urgentes);

  // Rodapé da tabela
  set('n3-foot-corr',   totCorr > 0 ? fmtR(totCorr) : '');
  set('n3-foot-oferta', totOferta > 0 ? fmtR(totOferta) : '');

  // Barra de progresso
  const progWrap = document.getElementById('n3-progresso-wrap');
  if (progWrap && n3Linhas.length > 0) {
    progWrap.style.display = 'block';
    const pct = Math.round(quitados.length / n3Linhas.length * 100);
    const bar = document.getElementById('n3-prog-bar');
    const pctEl = document.getElementById('n3-prog-pct');
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
    set('n3-prog-quit', quitados.length + ' quitada' + (quitados.length !== 1 ? 's' : ''));
    set('n3-prog-rest', ativos.length + ' ativa' + (ativos.length !== 1 ? 's' : ''));
  } else if (progWrap) {
    progWrap.style.display = 'none';
  }
}

// ── Exportar CSV aprimorado ──
function n3ExportCSV() {
  if (n3Linhas.length === 0) { alert('Nenhuma dívida para exportar.'); return; }
  const headers = ['Credor','Valor original (R$)','Tipo','Meses atraso','Valor corrigido (R$)','Oferta ideal (R$)','Oferta mín (R$)','Oferta máx (R$)','Desconto %','Prescrição','Prioridade','Status'];
  const rows = n3Linhas.map(l => {
    const c = calcDivida(l);
    const descPct = c.orig > 0 ? Math.round((1 - c.ofertaIdeal / c.corrigido) * 100) + '%' : '-';
    const presc   = c.prescrita ? 'Prescrita' : c.mesRestante + 'm restantes';
    return [
      l.credor, l.valor, l.tipo, l.meses,
      c.orig > 0 ? Math.round(c.corrigido) : '',
      c.orig > 0 ? Math.round(c.ofertaIdeal) : '',
      c.orig > 0 ? Math.round(c.ofertaMin) : '',
      c.orig > 0 ? Math.round(c.ofertaMax) : '',
      descPct, presc, c.prio, l.status
    ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',');
  });
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'QUITA_planilha_dividas_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function calcN3Div(){
  const v=parseFloat(document.getElementById('c0-orig')?.value)||0;
  const m=parseInt(document.getElementById('c0-meses')?.value)||0;
  const j=parseFloat(document.getElementById('c0-juros')?.value)/100||0;
  const hoje=v*Math.pow(1+j,m);
  const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('c0-hoje',fmt(hoje));
  // Oferta estimada: 50% para cartão/banco, mas exibir range realista
  const ofertaMin=hoje*0.40, ofertaMax=hoje*0.70;
  set('c0-oferta',fmt(ofertaMin)+' – '+fmt(ofertaMax));
  set('c0-econ',fmt(hoje-ofertaMin)+' – '+fmt(hoje-ofertaMax));
  // Aviso sobre estimativa
  const av=document.getElementById('c0-aviso');
  if(av) av.style.display = hoje>0 ? 'block' : 'none';
}

function calcN3Budget(){
  const r=parseFloat(document.getElementById('b5-renda')?.value)||0;
  const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('b5-50',fmt(r*.5));set('b5-30',fmt(r*.3));set('b5-20',fmt(r*.2));
}

function fmtBox(txt,color){
  return txt.replace(/\[([^\]]+)\]/g,`<span class="ph" style="color:${color};font-style:italic">[$1]</span>`).replace(/\n/g,'<br>');
}

function cpTxt(txt,btnId){
  const _done=()=>{
    const b=document.getElementById(btnId);
    if(!b)return;
    const orig=b.innerHTML;
    b.innerHTML=`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Copiado!`;
    b.classList.add('ok');
    setTimeout(()=>{b.innerHTML=orig;b.classList.remove('ok');},2000);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(txt).then(_done).catch(()=>_clipFallback(txt,_done));
  } else {
    _clipFallback(txt,_done);
  }
}
function _clipFallback(txt,cb){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); if(cb)cb(); }catch(e){}
  document.body.removeChild(ta);
}

function cpTxtRaw(txt,btnId){
  cpTxt(txt,btnId);
}

const SENHA_PATTERN = /^QUITA-[A-Z0-9]{6}-[A-Z0-9]{6}$/;

// Senhas revogadas (bloqueadas pelo admin) — armazenadas em localStorage
function getSenhasRevogadas() {
  try { return JSON.parse(localStorage.getItem('quita_revogadas') || '[]'); } catch(e) { return []; }
}

function tentarLogin() {
  const input = document.getElementById('login-input');
  const erro  = document.getElementById('login-erro');
  const senha = (input.value || '').trim().toUpperCase();

  // Validação de formato
  if (!SENHA_PATTERN.test(senha)) {
    mostrarErroLogin(input, erro, 'Formato inválido. Use: QUITA-XXXXXX-XXXXXX');
    return;
  }

  // Verifica se foi revogada
  if (getSenhasRevogadas().includes(senha)) {
    mostrarErroLogin(input, erro, 'Esta senha foi cancelada. Contate o suporte.');
    return;
  }

  // Senha válida — abre o app
  erro.style.display = 'none';
  const loginScreen = document.getElementById('login-screen');
  if (loginScreen) {
    loginScreen.style.opacity = '0';
    loginScreen.style.transition = 'opacity .3s ease';
    setTimeout(() => { loginScreen.style.display = 'none'; }, 300);
  }
  const app = document.getElementById('app-aluno');
  app.style.display = 'flex';
  app.innerHTML = gerarNivel(3);
  app.scrollTo(0, 0);
  initN3();
}

function mostrarErroLogin(input, erroEl, msg) {
  erroEl.textContent = msg;
  erroEl.style.display = 'block';
  input.style.borderColor = 'rgba(251,113,133,0.6)';
  input.classList.add('shake');
  setTimeout(() => { input.classList.remove('shake'); input.style.borderColor = ''; }, 500);
}

// Limpa dados corrompidos do localStorage (versão anterior)
(function() {
  try {
    const d = localStorage.getItem('quita_plan_v2');
    if (d) {
      const arr = JSON.parse(d);
      // Sanitiza dados existentes
      const clean = arr.map(l => ({
        ...l,
        meses: Math.min(parseInt(l.meses) || 0, 360),
        valor: Math.min(parseFloat(l.valor) || 0, 10000000)
      }));
      localStorage.setItem('quita_plan_v2', JSON.stringify(clean));
    }
  } catch(e) { localStorage.removeItem('quita_plan_v2'); }
})();

// Autodetecta senha na URL (vinda do obrigado.html via ?s=QUITA-...)
document.addEventListener("DOMContentLoaded", function() {
  const params = new URLSearchParams(window.location.search);
  const senhaUrl = params.get('s');
  if (senhaUrl) {
    const input = document.getElementById('login-input');
    if (input) {
      input.value = senhaUrl.toUpperCase();
      // Pequeno delay para a UI renderizar antes de tentar
      setTimeout(tentarLogin, 200);
    }
  }
});
</script>
